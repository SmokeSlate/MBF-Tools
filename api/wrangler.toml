name = "mbf-tools-logs-api"
main = "api/handler.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "LOGS"
id = "99d2d10849dc4644beeaffe5ffad70c3"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
